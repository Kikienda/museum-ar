<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: 100%;
  height: 100%;
  font-family: Arial;
}

/* Полноэкранный справочник */
#modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  color: white;
  display: none;
  z-index: 20;
  padding: 30px;
  box-sizing: border-box;
}

#closeBtn {
  margin-top: 20px;
  padding: 12px 20px;
  background: white;
  color: black;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="modal">
  <h2>Экспонат 1925 года</h2>
  <p>
    Историческая фотография.  
    Здесь размещается полный текст справочника.  
    Можно добавить больше информации, даты, факты и т.д.
  </p>
  <button id="closeBtn">Закрыть</button>
</div>

<a-scene
  embedded
  mindar-image="imageTargetSrc: targets.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0">

    <!-- ===== КРУГ ===== -->
    <a-ring
      position="0 0 0.1"
      radius-inner="0.06"
      radius-outer="0.09"
      color="white">
    </a-ring>

    <a-circle
      position="0 0 0.11"
      radius="0.06"
      color="black"
      opacity="0.25">
    </a-circle>

    <!-- ===== ЛИНИЯ ВВЕРХ ===== -->
    <a-box
      position="0 0.18 0.1"
      width="0.01"
      height="0.25"
      depth="0.01"
      color="white">
    </a-box>

    <!-- ===== ТАБЛИЧКА СВЕРХУ ===== -->
    <a-plane
      id="infoCard"
      position="0 0.35 0.1"
      width="0.9"
      height="0.35"
      color="white">
    </a-plane>

    <a-text
      value="Краткая информация"
      position="0 0.35 0.11"
      color="black"
      align="center"
      width="1.4">
    </a-text>

  </a-entity>

</a-scene>

<script>
const modal = document.getElementById("modal");
const closeBtn = document.getElementById("closeBtn");
const card = document.querySelector("#infoCard");

card.addEventListener("touchstart", function(e){
  e.preventDefault();
  modal.style.display = "block";
});

closeBtn.addEventListener("click", function(){
  modal.style.display = "none";
});
</script>

</body>
</html>
