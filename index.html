<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: 100%;
  height: 100%;
  font-family: Arial;
}

.circle {
  width: 50px;
  height: 50px;
  border: 2px solid white;
  border-radius: 50%;
  position: relative;
  margin: 0 auto;
  animation: pulse 2s infinite;
}

.circle::after {
  content: "";
  position: absolute;
  top: 12px;
  left: 12px;
  width: 26px;
  height: 26px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.1); opacity: 0.7; }
  100% { transform: scale(1); opacity: 1; }
}

.line {
  width: 2px;
  height: 40px;
  background: rgba(255,255,255,0.7);
  margin: 0 auto;
}

.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  text-align: center;
  margin-top: 5px;
  font-size: 14px;
  border: 1px solid rgba(255,255,255,0.3);
}

/* ===== 2D UI ===== */
#arUI {
  position: fixed;
  display: none;
  z-index: 10;
  pointer-events: auto;
}

/* Модальное окно */
#modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  color: white;
  display: none;
  z-index: 20;
  padding: 30px;
  box-sizing: border-box;
}

#closeBtn {
  margin-top: 20px;
  padding: 12px 20px;
  background: white;
  color: black;
  border: none;
  border-radius: 8px;
}

#arUI {
  position: fixed;
  display: none;
  z-index: 10;
  pointer-events: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: all 0.2s ease;
}

.up {
  flex-direction: column-reverse;
}

</style>
</head>

<body>

<div id="arUI">
  <div class="circle"></div>
  <div class="line"></div>
  <div class="card" id="openCard">Краткая информация</div>
</div>

<div id="modal">
  <h2>Экспонат 1925 года</h2>
  <p>Полный текст справочника, описание и факты.</p>
  <button id="closeBtn">Закрыть</button>
</div>

<a-scene
  embedded
  mindar-image="imageTargetSrc: targets.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0">
    <!-- Невидимая точка-якорь -->
    <a-entity id="anchorPoint" position="0 0 0"></a-entity>
  </a-entity>

</a-scene>

<script>
const arUI = document.getElementById("arUI");
const target = document.getElementById("target");
const anchor = document.getElementById("anchorPoint");
const camera = document.getElementById("camera");
const modal = document.getElementById("modal");
const closeBtn = document.getElementById("closeBtn");
const openCard = document.getElementById("openCard");

let isTracking = false;

target.addEventListener("targetFound", () => {
  arUI.style.display = "block";
  isTracking = true;
});

target.addEventListener("targetLost", () => {
  arUI.style.display = "none";
  modal.style.display = "none";
  isTracking = false;
});

// Обновление позиции каждый кадр
AFRAME.registerComponent("ui-follow", {
  tick: function () {
    if (!isTracking) return;

    const vector = new THREE.Vector3();
    anchor.object3D.getWorldPosition(vector);
    vector.project(camera.getObject3D("camera"));

    const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;

    arUI.style.left = `${x}px`;
arUI.style.top = `${y}px`;

// Если точка в верхней части экрана
if (y < window.innerHeight / 2) {
  // Точка в верхней части → карточка над точкой
  arUI.classList.add("up");
} else {
  // Точка в нижней части → карточка под точкой
  arUI.classList.remove("up");
}

arUI.style.transform = "translate(-50%, -50%)";
  }
});

anchor.setAttribute("ui-follow", "");

openCard.addEventListener("click", () => {
  modal.style.display = "block";
});

closeBtn.addEventListener("click", () => {
  modal.style.display = "none";
});
</script>

</body>
</html>
