<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
                 initial-scale=1.0,
                 maximum-scale=1.0,
                 user-scalable=no,
                 viewport-fit=cover">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: black;
    }

    a-scene {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  cursor="rayOrigin: mouse"
  raycaster="objects: .clickable">

  <!-- Камера -->
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- Target -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- Кликабельная точка -->
    <a-sphere 
      id="infoPoint"
      position="0 0 0.1"
      radius="0.06"
      color="red"
      class="clickable"
      animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 800; loop: true">
    </a-sphere>

    <!-- Панель справочника -->
    <a-entity id="infoPanel" visible="false">

      <a-plane 
        position="0 0.5 0"
        width="1.6"
        height="0.8"
        color="black"
        opacity="0.9">
      </a-plane>

      <a-text
        value="Экспонат 1925 года.\nИсторическая фотография.\n\nНажмите ещё раз на точку,\nчтобы закрыть справочник."
        position="0 0.5 0.01"
        color="yellow"
        align="center"
        width="1.5">
      </a-text>

    </a-entity>

  </a-entity>

</a-scene>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const point = document.querySelector("#infoPoint");
  const panel = document.querySelector("#infoPanel");

  let isOpen = false;

  point.addEventListener("click", () => {
    isOpen = !isOpen;
    panel.setAttribute("visible", isOpen);
  });
});
</script>

</body>
</html>
