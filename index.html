<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
                 initial-scale=1.0,
                 maximum-scale=1.0,
                 user-scalable=no">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<a-scene
  embedded
  mindar-image="imageTargetSrc: targets.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- Точка -->
    <a-sphere 
      id="infoPoint"
      position="0 0 0.1"
      radius="0.1"
      color="red">
    </a-sphere>

    <!-- Панель -->
    <a-entity id="infoPanel" visible="false">

      <a-plane 
        position="0 0.5 0"
        width="1.6"
        height="0.8"
        color="black"
        opacity="0.9">
      </a-plane>

      <a-text
        value="Экспонат 1925 года\nИсторическая фотография"
        position="0 0.5 0.01"
        color="yellow"
        align="center"
        width="1.5">
      </a-text>

    </a-entity>

  </a-entity>

</a-scene>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const point = document.querySelector("#infoPoint");
  const panel = document.querySelector("#infoPanel");

  let isOpen = false;

  // Для Safari на iPhone
  point.addEventListener("touchstart", function (e) {
    e.preventDefault();
    isOpen = !isOpen;
    panel.setAttribute("visible", isOpen);
  });

});
</script>

</body>
</html>
