<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

<script>
const arUI = document.getElementById("arUI");
const target = document.getElementById("target");
const anchor = document.getElementById("anchorPoint");
const camera = document.getElementById("camera");
const modal = document.getElementById("modal");
const closeBtn = document.getElementById("closeBtn");
const openCard = document.getElementById("openCard");

let isTracking = false;

arUI.style.display = "none";

target.addEventListener("targetFound", () => {
  isTracking = true;
  arUI.style.display = "block";
});

target.addEventListener("targetLost", () => {
  isTracking = false;
  arUI.style.display = "none";
  modal.style.display = "none";
});

AFRAME.registerComponent("ui-follow", {
  tick: function () {
    if (!isTracking) return;

    // === 1. Определяем положение экспоната относительно камеры ===
    const worldPos = new THREE.Vector3();
    anchor.object3D.getWorldPosition(worldPos);

    const cameraLocal = worldPos.clone();
    camera.object3D.worldToLocal(cameraLocal);

    // Если экспонат выше центра камеры
    if (cameraLocal.y > 0) {
      // Точка ставится внизу экспоната
      anchor.object3D.position.y = -0.4;
      arUI.classList.remove("up"); // табличка вниз
    } else {
      // Точка ставится вверху экспоната
      anchor.object3D.position.y = 0.4;
      arUI.classList.add("up"); // табличка вверх
    }

    // === 2. Проекция на экран ===
    const screenVector = new THREE.Vector3();
    anchor.object3D.getWorldPosition(screenVector);
    screenVector.project(camera.getObject3D("camera"));

    const x = (screenVector.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-screenVector.y * 0.5 + 0.5) * window.innerHeight;

    arUI.style.left = `${x}px`;
    arUI.style.top = `${y}px`;
  }
});

anchor.setAttribute("ui-follow", "");

openCard.addEventListener("click", () => {
  modal.style.display = "block";
});

closeBtn.addEventListener("click", () => {
  modal.style.display = "none";
});
</script>
</head>

<body>

<div id="arUI">
  <div class="circle"></div>
  <div class="line"></div>
  <div class="card" id="openCard">Краткая информация</div>
</div>

<div id="modal">
  <h2>Экспонат 1925 года</h2>
  <p>Полный текст справочника, описание и факты.</p>
  <button id="closeBtn">Закрыть</button>
</div>

<a-scene
  embedded
  mindar-image="imageTargetSrc: targets.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0">
    <a-entity id="anchorPoint" position="0 0 0"></a-entity>
  </a-entity>

</a-scene>

<script>
const arUI = document.getElementById("arUI");
const target = document.getElementById("target");
const anchor = document.getElementById("anchorPoint");
const camera = document.getElementById("camera");
const modal = document.getElementById("modal");
const closeBtn = document.getElementById("closeBtn");
const openCard = document.getElementById("openCard");

let isTracking = false;

arUI.style.display = "none";

target.addEventListener("targetFound", () => {
  isTracking = true;
  arUI.style.display = "block";
});

target.addEventListener("targetLost", () => {
  isTracking = false;
  arUI.style.display = "none";
  modal.style.display = "none";
});

AFRAME.registerComponent("ui-follow", {
  tick: function () {
    if (!isTracking) return;

    const vector = new THREE.Vector3();
    anchor.object3D.getWorldPosition(vector);
    vector.project(camera.getObject3D("camera"));

    const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;

    arUI.style.left = `${x}px`;
      arUI.style.top = `${y}px`;

      // Проверяем реальную высоту точки относительно камеры
      if (vector.y > 0) {
        // Точка выше центра камеры → карточка НАД точкой
        arUI.style.transform = "translate(-50%, -120%)";
      } else {
        // Точка ниже центра → карточка ПОД точкой
        arUI.style.transform = "translate(-50%, 20px)";
      }
  }
});

anchor.setAttribute("ui-follow", "");

openCard.addEventListener("click", () => {
  modal.style.display = "block";
});

closeBtn.addEventListener("click", () => {
  modal.style.display = "none";
});
</script>

</body>
</html>
