<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: 100%;
  height: 100%;
  font-family: Arial;
}

/* ===== 2D UI ===== */
#arUI {
  position: fixed;
  display: none; /* ВАЖНО — только none */
  z-index: 10;
  pointer-events: auto;
  transform: translate(-50%, -50%);
  flex-direction: column;
  align-items: center;
  transition: left 0.1s linear, top 0.1s linear;
}

/* Круг */
.circle {
  width: 50px;
  height: 50px;
  border: 2px solid white;
  border-radius: 50%;
  position: relative;
}

.circle::after {
  content: "";
  position: absolute;
  top: 12px;
  left: 12px;
  width: 26px;
  height: 26px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
}

/* Линия */
.line {
  width: 2px;
  height: 40px;
  background: rgba(255,255,255,0.7);
}

/* Табличка */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  border: 1px solid rgba(255,255,255,0.3);
  margin-top: 5px;
}

/* Модалка */
#modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  color: white;
  display: none;
  z-index: 20;
  padding: 100px 30px 30px 30px; /* 👈 ВАЖНО */
  box-sizing: border-box;
}

#backBtn {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 18px;
  cursor: pointer;
  padding: 10px 14px;
  background: rgba(255,255,255,0.15);
  border-radius: 8px;
}
</style>
</head>

<body>

<div id="arUI">
  <div class="circle"></div>
  <div class="line"></div>
  <div class="card" id="openCard">Краткая информация</div>
</div>

<div id="modal">
  <div id="backBtn">← Назад</div>
  <h2>Экспонат 1925 года</h2>
  <p>Полный текст справочника, описание и факты.</p>
</div>

<a-scene
  embedded
  mindar-image="imageTargetSrc: targets.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Экспонат 1 -->
      <a-entity id="target1" mindar-image-target="targetIndex: 0">
        <a-entity id="anchor1" position="0 -0.4 0"></a-entity>
      </a-entity>

      <!-- Экспонат 2 -->
      <a-entity id="target2" mindar-image-target="targetIndex: 1">
        <a-entity id="anchor2" position="0 -0.4 0"></a-entity>
      </a-entity>

</a-scene>

<script>
document.addEventListener("DOMContentLoaded", function() {

const arUI = document.getElementById("arUI");
const camera = document.getElementById("camera");
const modal = document.getElementById("modal");
const openCard = document.getElementById("openCard");
const backBtn = document.getElementById("backBtn");

// Два таргета
const target1 = document.getElementById("target1");
const target2 = document.getElementById("target2");

const anchor1 = document.getElementById("anchor1");
const anchor2 = document.getElementById("anchor2");

let activeAnchor = null;
let isTracking = false;

/* ===================== */
/* FOLLOW COMPONENT */
/* ===================== */

AFRAME.registerComponent("ui-follow", {
  tick: function () {
    if (!isTracking || !activeAnchor) return;

    const screenVector = new THREE.Vector3();
    activeAnchor.object3D.getWorldPosition(screenVector);
    screenVector.project(camera.getObject3D("camera"));

    const x = (screenVector.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-screenVector.y * 0.5 + 0.5) * window.innerHeight;

    arUI.style.left = `${x}px`;
    arUI.style.top = `${y}px`;
  }
});

/* ===================== */
/* TARGET 1 */
/* ===================== */

target1.addEventListener("targetFound", () => {
  activeAnchor = anchor1;
  isTracking = true;

  arUI.style.display = "flex";
  anchor1.setAttribute("ui-follow", "");

  document.querySelector("#modal h2").innerText = "Экспонат 1925 года";
  document.querySelector("#modal p").innerText =
    "Описание первого экспоната. Исторические факты и информация.";
});

target1.addEventListener("targetLost", () => {
  isTracking = false;
  arUI.style.display = "none";
  anchor1.removeAttribute("ui-follow");
});

/* ===================== */
/* TARGET 2 */
/* ===================== */

target2.addEventListener("targetFound", () => {
  activeAnchor = anchor2;
  isTracking = true;

  arUI.style.display = "flex";
  anchor2.setAttribute("ui-follow", "");

  document.querySelector("#modal h2").innerText = "Экспонат 1930 года";
  document.querySelector("#modal p").innerText =
    "Описание второго экспоната. Дополнительные исторические данные.";
});

target2.addEventListener("targetLost", () => {
  isTracking = false;
  arUI.style.display = "none";
  anchor2.removeAttribute("ui-follow");
});

/* ===================== */
/* UI */
/* ===================== */

openCard.addEventListener("click", () => {
  modal.style.display = "block";
});

backBtn.addEventListener("click", () => {
  modal.style.display = "none";
});

});
</script>

</body>
</html>
